<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión de Gastos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" required placeholder="ejemplo@correo.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" required placeholder="Tu contraseña">
        </div>
        <button type="submit">Ingresar</button>
    </form>
    <div id="message" class="message"></div>
</div>

<script>
    // Datos simulados preexistentes en localStorage para la prueba
    // (En una app real, esto se crearía desde el formulario de Registro)
    if (!localStorage.getItem('userEmail')) {
        localStorage.setItem('userEmail', 'usuario@correo.com');
        localStorage.setItem('userPassword', '123456');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página se recargue
        
        const inputEmail = document.getElementById('email').value;
        const inputPassword = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        // Obtener credenciales guardadas en localStorage
        const storedEmail = localStorage.getItem('userEmail');
        const storedPassword = localStorage.getItem('userPassword');

        // Validación de campos
        if (inputEmail === storedEmail && inputPassword === storedPassword) {
            messageDiv.style.color = "green";
            messageDiv.innerText = "¡Acceso concedido exitosamente!";
        } else {
            messageDiv.style.color = "red";
            messageDiv.innerText = "Error: El email o la contraseña no coinciden.";
        }
    });
</script>

</body>
</html>
