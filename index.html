<!DOCTYPE html>
<html lang="es"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión de Gastos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
        }
        h2 { text-align: center; color: #1a1a1a; } /* Contraste alto para el título */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #2d2d2d; font-weight: bold; } /* Texto más oscuro para accesibilidad */
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #767676; border-radius: 4px; font-size: 16px; } /* Bordes visibles y tamaño de fuente accesible */
        
        /* 2. Azul con contraste mejorado (#0056b3) para cumplir la regla WCAG AA de Lighthouse */
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { background-color: #003d82; }
        
        /* Contenedor de mensajes con accesibilidad (región aria-live) */
        .message { margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<main class="login-card"> <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" required placeholder="ejemplo@correo.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" required placeholder="Introduce tu contraseña" autocomplete="current-password">
        </div>
        <button type="submit" aria-label="Iniciar sesión en el sistema de gastos">Ingresar</button>
    </form>
    
    <div id="message" class="message" aria-live="polite"></div>
</main>

<script>
    if (!localStorage.getItem('userEmail')) {
        localStorage.setItem('userEmail', 'usuario@correo.com');
        localStorage.setItem('userPassword', '123456');
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const inputEmail = document.getElementById('email').value;
        const inputPassword = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        const storedEmail = localStorage.getItem('userEmail');
        const storedPassword = localStorage.getItem('userPassword');

        if (inputEmail === storedEmail && inputPassword === storedPassword) {
            messageDiv.style.color = "#1967d2"; // Azul accesible para el éxito
            messageDiv.innerText = "¡Acceso concedido exitosamente!";
        } else {
            messageDiv.style.color = "#c5221f"; // Rojo accesible para el error
            messageDiv.innerText = "Error: El email o la contraseña no coinciden.";
        }
    });
</script>

</body>
</html>
